<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="SportGuard Pro - AI-powered sports injury prevention and monitoring platform with real-time alerts and gear tracking." />
  <meta name="theme-color" content="#14b8a6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SportGuard" />
  
  <title>SportGuard Pro</title>
  
  <!-- Icons -->
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  
  <!-- Navigation -->
  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="#/" data-nav="/"><span class="icon">🏠</span>Home</a>
      <a href="#/map" data-nav="/map"><span class="icon">🗺️</span>Map</a>
      <a href="#/record" data-nav="/record"><span class="icon">📋</span>Record</a>
      <a href="#/settings" data-nav="/settings"><span class="icon">⚙️</span>Setting</a>
      <a href="#/profile" data-nav="/profile"><span class="icon">👤</span>Profile</a>
    </div>
  </nav>

  <!-- Main App Script -->
  <script src="app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .then((registration) => {
            console.log("✅ Service Worker registered successfully:", registration);
          })
          .catch((error) => {
            console.log("❌ Service Worker registration failed:", error);
          });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log("✅ PWA install prompt available");
    });

    window.addEventListener("appinstalled", () => {
      console.log("✅ PWA installed successfully");
      deferredPrompt = null;
    });
  </script>
</body>
</html>
